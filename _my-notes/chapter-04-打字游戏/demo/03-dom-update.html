        body { 
            font-family: 'Courier New', monospace; 
            padding: 20px;
            background: #2d2d2d;

        }
        .word-box {
            font-size: 48px;
            text-align: center;
            padding: 40px;
            background: #383838;
            border-radius: 10px;
            margin: 30px 0;
            letter-spacing: 8px;
        }
        .char {
            display: inline-block;
            padding: 5px;
            border-radius: 5px;
            transition: all 0.2s;
        }
        .char.correct { 
            background: #50fa7b; 
            color: #282a36;
        }
        .char.wrong { 
            background: #ff5555; 
        }
        .char.pending {
            color: #6272a4;
        }
        .char.current {
            border-bottom: 3px solid #8be9fd;
        }
        input {
            display: block;
            width: 100%;
            max-width: 400px;
            margin: 20px auto;
            padding: 15px;
            font-size: 24px;
            text-align: center;
            border: 2px solid #6272a4;
            border-radius: 8px;
            background: #383838;
            color: #f8f8f2;
        }
        input:focus {
            outline: none;
            border-color: #8be9fd;
        }
        .progress-bar {
            width: 100%;
            height: 10px;
            background: #383838;
            border-radius: 5px;
            overflow: hidden;
            margin: 20px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #50fa7b, #8be9fd);
            width: 0%;
            transition: width 0.3s;
        }
        .feedback {
            text-align: center;
            font-size: 24px;
            height: 40px;
        }
        .feedback.success { color: #50fa7b; }
        .feedback.error { color: #ff5555; }
    </style>
</head>
