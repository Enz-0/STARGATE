<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>键盘事件练习</title>
    <!-- STEP2-DONE -->
    <style>
        body { 
            font-family: Arial, sans-serif; 
            padding: 20px;
            background: #1a1a2e;
            color: white;
        }
        .key-display {
            font-size: 48px;
            text-align: center;
            padding: 40px;
            background: #16213e;
            border-radius: 10px;
            margin: 20px 0;
            min-height: 60px;
        }
        .info {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        .info-box {
            background: #0f3460;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .info-label { color: #e94560; font-size: 12px; }
        .info-value { font-size: 24px; font-weight: bold; margin-top: 5px; }
        .pressed-keys {
            background: #16213e;
            padding: 20px;
            border-radius: 10px;
            min-height: 100px;
        }
        .key-tag {
            display: inline-block;
            background: #e94560;
            padding: 5px 15px;
            margin: 5px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>⌨️ 键盘事件练习</h1>
    <p>按下任意键查看事件信息</p>
    
    <div class="key-display" id="current-key">
        等待按键...
    </div>

    <div class="info">
        <div class="info-box">
            <div class="info-label">event.key</div>
            <div class="info-value" id="key-value">-</div>
        </div>
        <div class="info-box">
            <div class="info-label">event.code</div>
            <div class="info-value" id="code-value">-</div>
        </div>
        <div class="info-box">
            <div class="info-label">组合键</div>
            <div class="info-value" id="modifier-value">-</div>
        </div>
    </div>

    <div class="pressed-keys">
        <h3>按键历史:</h3>
        <div id="key-history"></div>
    </div>

    <script>
        // STEP2-DONE
        // 💡 第4步实操区 - 键盘事件练习

        const keyDisplay = document.querySelector('#current-key');
        const keyValue = document.querySelector('#key-value');
        const codeValue = document.querySelector('#code-value');
        const modifierValue = document.querySelector('#modifier-value');
        const keyHistory = document.querySelector('#key-history');

        // 💡 第4步实操区：添加 keydown 事件监听
        // 1. 显示当前按键的 key 和 code
        // 2. 检测是否按下了 Ctrl/Shift/Alt
        // 3. 将按键添加到历史记录
        document.addEventListener('keydown', (e) => {
            // 你的代码在这里
            
            
        });

        // 💡 第4步实操区：添加 keyup 事件监听
        // 显示按键已释放
        document.addEventListener('keyup', (e) => {
            // 你的代码在这里
            
            
        });
    </script>
</body>
</html>
