<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>湖南韶山旅游指南</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1 { color: #2e8b57; }
        section { margin-bottom: 20px; }
    </style>
</head>
<body>
    <header>
        <h1>湖南韶山旅游指南</h1>
        <p>探索毛泽东故居和韶山的美景</p>
    </header>
    
    <section id="introduction">
        <h2>简介</h2>
        <p>韶山位于湖南省湘潭市，是毛泽东主席的出生地。这里有丰富的红色旅游资源和自然风光。</p>
    </section>
    
    <section id="attractions">
        <h2>主要景点</h2>
        <ul>
            <li>毛泽东故居：了解伟人的童年生活</li>
            <li>韶山冲：美丽的乡村风光</li>
            <li>滴水洞：自然景观和历史遗迹</li>
        </ul>
    </section>
    
    <section id="tips">
        <h2>旅游提示</h2>
        <p>最佳游览时间：春季和秋季。建议提前购票，尊重历史遗迹。</p>
    </section>
    
    <footer>
        <p>&copy; 2023 韶山旅游指南</p>
    </footer>
</body>
